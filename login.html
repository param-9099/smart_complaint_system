<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #eef1f3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      padding: 48px 56px;
      width: 100%;
      max-width: 560px;
    }
    h1 {
      text-align: center;
      color: #5252d4;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 36px;
    }
    label {
      display: block;
      font-size: 1rem;
      font-weight: 500;
      color: #111;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #d8dde3;
      border-radius: 10px;
      font-size: 1rem;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
      color: #111;
    }
    input:focus { border-color: #5252d4; background: #fff; }
    button {
      width: 100%;
      padding: 18px;
      background: #5252d4;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
    }
    button:hover { background: #4040c0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>User Login</h1>
    <label for="email">Email</label>
    <input type="email" id="email" autocomplete="email" />
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" />
    <button type="button" onclick="window.location.href='meme.html'">Login</button>
  </div>
</body>
</html>
